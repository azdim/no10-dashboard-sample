# Dataset catalogue — local CSV for DATA_SOURCE=local, R2 keys for DATA_SOURCE=r2.
# r2_key is the object path inside the bucket (not including the bucket name).
datasets:
  - id: customer_data
    local_path: customer_data.csv
    r2_key: data/customer_data.csv

  - id: sales_data
    local_path: sales_data.csv
    r2_key: data/sales_data.csv

  - id: financial_data
    local_path: financial_data.csv
    r2_key: data/financial_data.csv
