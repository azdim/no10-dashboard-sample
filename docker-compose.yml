services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dashboard_db
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: dashboard_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_user -d dashboard_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    ports:
      - "8050:8050"
    environment:
      - DASH_DEBUG=true
      - DATABASE_URL=postgresql://dashboard_user:dashboard_password@postgres:5432/dashboard_db
    volumes:
      # Mount data directory for development (simulating CSV file updates)
      - ./data:/app/data:ro
      # Mount app directory for development (hot reload)
      - ./app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add nginx reverse proxy for production-like setup
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data: